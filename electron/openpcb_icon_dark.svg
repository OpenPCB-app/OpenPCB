<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark-mode variant: navy body (#0d111c) + purple glyph (#845EEE), same macOS 824/1024 grid -->
    <radialGradient id="vbg" cx="40%" cy="16%" r="95%">
      <stop offset="0" stop-color="#11162a"/>
      <stop offset="0.55" stop-color="#0d1220"/>
      <stop offset="1" stop-color="#0b0f18"/>
    </radialGradient>
    <!-- soft ambient shadow under the icon body, macOS-style -->
    <filter id="bgShadow" x="-8%" y="-8%" width="116%" height="118%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="bodyClip">
      <rect x="100" y="100" width="824" height="824" rx="180"/>
    </clipPath>
  </defs>

  <!-- icon body (rounded square + ambient shadow) -->
  <g filter="url(#bgShadow)">
    <rect x="100" y="100" width="824" height="824" rx="180" fill="url(#vbg)"/>
  </g>

  <!-- blueprint grid, clipped to the rounded body -->
  <g clip-path="url(#bodyClip)" stroke="#c7d2fe" stroke-width="2" opacity="0.10">
    <path d="M100 203 H924 M100 306 H924 M100 409 H924 M100 512 H924 M100 615 H924 M100 718 H924 M100 821 H924"/>
    <path d="M203 100 V924 M306 100 V924 M409 100 V924 M512 100 V924 M615 100 V924 M718 100 V924 M821 100 V924"/>
  </g>

  <!-- glyph: PCB net node in brand purple, enlarged to ~58% of the body -->
  <g transform="translate(192,192) scale(26.6667)">
    <rect x="3" y="3" width="18" height="18" rx="3" fill="none" stroke="#845eee" stroke-width="2"/>
    <line x1="8" y1="8" x2="16" y2="16" stroke="#845eee" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="8" cy="8" r="1.5" fill="#845eee"/>
    <circle cx="16" cy="8" r="1.5" fill="#845eee"/>
    <circle cx="8" cy="16" r="1.5" fill="#845eee"/>
    <circle cx="16" cy="16" r="1.5" fill="#845eee"/>
  </g>
</svg>
