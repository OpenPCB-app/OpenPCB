name: Release Electron

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-15
            platform: mac
            arch: arm64
            rollup_package: darwin-arm64
            lightningcss_package: darwin-arm64
            tailwindcss_oxide_package: darwin-arm64
          - name: macOS x64
            os: macos-15-intel
            platform: mac
            arch: x64
            rollup_package: darwin-x64
            lightningcss_package: darwin-x64
            tailwindcss_oxide_package: darwin-x64
          - name: Windows x64
            os: windows-latest
            platform: win
            arch: x64
            rollup_package: win32-x64-msvc
            lightningcss_package: win32-x64-msvc
            tailwindcss_oxide_package: win32-x64-msvc

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: ${{ runner.os }}-${{ runner.arch }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-electron-

      - name: Install dependencies
        run: npm ci

      - name: Repair optional native dependencies
        run: |
          ROLLUP_VERSION="$(node -p "require('./package-lock.json').packages['node_modules/rollup'].version")"
          LIGHTNINGCSS_VERSION="$(node -p "require('./package-lock.json').packages['node_modules/lightningcss'].version")"
          TAILWINDCSS_OXIDE_VERSION="$(node -p "require('./package-lock.json').packages['node_modules/@tailwindcss/oxide'].version")"
          npm install --no-save \
            "@rollup/rollup-${{ matrix.rollup_package }}@${ROLLUP_VERSION}" \
            "lightningcss-${{ matrix.lightningcss_package }}@${LIGHTNINGCSS_VERSION}" \
            "@tailwindcss/oxide-${{ matrix.tailwindcss_oxide_package }}@${TAILWINDCSS_OXIDE_VERSION}"

      - name: Validate release version
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const rootPackage = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const electronPackage = JSON.parse(fs.readFileSync('electron/package.json', 'utf8'));
          const tagVersion = (process.env.GITHUB_REF_NAME || '').replace(/^v/, '');

          if (rootPackage.version !== electronPackage.version) {
            throw new Error(`Root package version ${rootPackage.version} does not match electron package version ${electronPackage.version}`);
          }

          if (tagVersion !== electronPackage.version) {
            throw new Error(`Tag version ${tagVersion} does not match electron package version ${electronPackage.version}`);
          }

          console.log(`Release version ${tagVersion} validated`);
          NODE

      - name: Compile Bun sidecar
        run: npm run bun:compile

      - name: Build frontend
        run: npm run build:frontend

      - name: Build Electron main process
        run: npm run build --workspace electron

      - name: Package Electron app
        run: npm run dist --workspace electron -- --${{ matrix.platform }} --${{ matrix.arch }} --publish never

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            electron/dist-electron/*.dmg
            electron/dist-electron/*.zip
            electron/dist-electron/*.exe
            electron/dist-electron/*.blockmap
            electron/dist-electron/*.yml
            electron/dist-electron/*.yaml
          if-no-files-found: ignore

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish complete prerelease
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release delete "${GITHUB_REF_NAME}" --yes || true
          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --prerelease \
            --title "${GITHUB_REF_NAME}" \
            --notes "Unsigned beta Electron builds for macOS arm64, macOS x64, and Windows x64." \
            release-artifacts/electron-mac-arm64/beta-mac-arm64-mac.yml \
            "release-artifacts/electron-mac-arm64/OpenPCB-${VERSION}-mac-arm64.dmg" \
            "release-artifacts/electron-mac-arm64/OpenPCB-${VERSION}-mac-arm64.dmg.blockmap" \
            "release-artifacts/electron-mac-arm64/OpenPCB-${VERSION}-mac-arm64.zip" \
            "release-artifacts/electron-mac-arm64/OpenPCB-${VERSION}-mac-arm64.zip.blockmap" \
            release-artifacts/electron-mac-x64/beta-mac-x64-mac.yml \
            "release-artifacts/electron-mac-x64/OpenPCB-${VERSION}-mac-x64.dmg" \
            "release-artifacts/electron-mac-x64/OpenPCB-${VERSION}-mac-x64.dmg.blockmap" \
            "release-artifacts/electron-mac-x64/OpenPCB-${VERSION}-mac-x64.zip" \
            "release-artifacts/electron-mac-x64/OpenPCB-${VERSION}-mac-x64.zip.blockmap" \
            release-artifacts/electron-win-x64/beta-win-x64.yml \
            "release-artifacts/electron-win-x64/OpenPCB-${VERSION}-win-x64.exe" \
            "release-artifacts/electron-win-x64/OpenPCB-${VERSION}-win-x64.exe.blockmap"
