name: Release

on:
  push:
    tags:
      - "dev-*"
      - "v*"
  workflow_dispatch:
    inputs:
      artifact_suffix:
        description: "Suffix for build artifact names (e.g. smoke, dryrun)"
        required: false
        default: "smoke"
      corelib_tag:
        description: "Override CoreLibrary tag to bundle (default: latest stable). Example: v0.1.0-beta.0"
        required: false
        default: ""

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    # Surface the resolved CoreLibrary metadata to the publish job. Each
    # matrix job sets the same values (same upstream release); GitHub Actions
    # uses the value from the last job to finish — fine for our use.
    outputs:
      corelib_tag: ${{ steps.corelib.outputs.tag }}
      corelib_version: ${{ steps.corelib.outputs.version }}
      corelib_components: ${{ steps.corelib.outputs.components }}
      corelib_footprints: ${{ steps.corelib.outputs.footprints }}
      corelib_symbols: ${{ steps.corelib.outputs.symbols }}
      corelib_models3d: ${{ steps.corelib.outputs.models3d }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-15
            platform: mac
            arch: arm64
            rollup_package: darwin-arm64
            lightningcss_package: darwin-arm64
            tailwindcss_oxide_package: darwin-arm64
          - name: macOS x64
            os: macos-15-intel
            platform: mac
            arch: x64
            rollup_package: darwin-x64
            lightningcss_package: darwin-x64
            tailwindcss_oxide_package: darwin-x64
          - name: Windows x64
            os: windows-latest
            platform: win
            arch: x64
            rollup_package: win32-x64-msvc
            lightningcss_package: win32-x64-msvc
            tailwindcss_oxide_package: win32-x64-msvc
          - name: Linux x64
            os: ubuntu-latest
            platform: linux
            arch: x64
            rollup_package: linux-x64-gnu
            lightningcss_package: linux-x64-gnu
            tailwindcss_oxide_package: linux-x64-gnu

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache Electron + electron-builder downloads
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: ${{ runner.os }}-${{ runner.arch }}-eb-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-eb-

      - name: Install dependencies
        run: npm ci

      # Verify the @openpcb/* packages installed correctly. The lockfile pins
      # each to a specific tag SHA, so npm ci should produce a consistent tree;
      # this is just a defensive sanity check before electron-builder.
      - name: Verify @openpcb/opclib-pack version
        run: |
          set -euo pipefail
          v=$(node -p "require('./node_modules/@openpcb/opclib-pack/package.json').version")
          echo "installed @openpcb/opclib-pack version: $v"
          if ! grep -q 'signManifest' node_modules/@openpcb/opclib-pack/dist/index.d.ts; then
            echo "FATAL: opclib-pack dist missing signManifest export" >&2
            exit 1
          fi

      - name: Setup Bun (for CoreLibrary fetch script)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Fetch + verify CoreLibrary release
        id: corelib
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # On tag-triggered builds: latest stable. On workflow_dispatch:
          # honour corelib_tag input if provided.
          args=""
          if [ -n "${{ github.event.inputs.corelib_tag }}" ]; then
            args="--tag=${{ github.event.inputs.corelib_tag }}"
          fi
          summary="$(bun scripts/fetch-core-library.ts $args)"
          echo "$summary"
          {
            echo "tag=$(echo "$summary" | jq -r .tag)"
            echo "version=$(echo "$summary" | jq -r .version)"
            echo "components=$(echo "$summary" | jq -r .components)"
            echo "footprints=$(echo "$summary" | jq -r .footprints)"
            echo "symbols=$(echo "$summary" | jq -r .symbols)"
            echo "models3d=$(echo "$summary" | jq -r .models3d)"
          } >> "$GITHUB_OUTPUT"

      - name: Install Linux build deps
        if: matrix.platform == 'linux'
        # electron-builder ships appimagetool itself, so squashfs-tools is not
        # required. fakeroot+dpkg → .deb; rpm → .rpm via fpm.
        run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg rpm xvfb

      - name: Install Linux Playwright/Electron runtime deps
        if: matrix.platform == 'linux'
        run: npx playwright install --with-deps chromium

      - name: Repair optional native dependencies
        run: |
          ROLLUP_VERSION="$(node -p "require('./package-lock.json').packages['node_modules/rollup'].version")"
          LIGHTNINGCSS_VERSION="$(node -p "require('./package-lock.json').packages['node_modules/lightningcss'].version")"
          TAILWINDCSS_OXIDE_VERSION="$(node -p "require('./package-lock.json').packages['node_modules/@tailwindcss/oxide'].version")"
          npm install --no-save \
            "@rollup/rollup-${{ matrix.rollup_package }}@${ROLLUP_VERSION}" \
            "lightningcss-${{ matrix.lightningcss_package }}@${LIGHTNINGCSS_VERSION}" \
            "@tailwindcss/oxide-${{ matrix.tailwindcss_oxide_package }}@${TAILWINDCSS_OXIDE_VERSION}"

      - name: Validate release version
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const rootPackage = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const electronPackage = JSON.parse(fs.readFileSync('electron/package.json', 'utf8'));
          const refName = process.env.GITHUB_REF_NAME || '';

          if (rootPackage.version !== electronPackage.version) {
            throw new Error(`Root package version ${rootPackage.version} does not match electron package version ${electronPackage.version}`);
          }

          if (process.env.GITHUB_EVENT_NAME === 'workflow_dispatch') {
            console.log(`Manual release smoke for ${refName} — skipping strict tag/package version match (package version ${electronPackage.version})`);
          } else if (refName.startsWith('dev-')) {
            console.log(`Dev tag ${refName} — skipping strict version match (package version ${electronPackage.version})`);
          } else {
            const tagVersion = refName.replace(/^v/, '');
            if (tagVersion !== electronPackage.version) {
              throw new Error(`Tag version ${tagVersion} does not match electron package version ${electronPackage.version}`);
            }
            console.log(`Release version ${tagVersion} validated`);
          }
          NODE

      - name: Typecheck
        run: npm run typecheck

      - name: Build frontend
        run: npm run build:frontend

      - name: Build electron main + preload (tsup)
        run: npm run build --workspace electron

      - name: Package with electron-builder
        working-directory: electron
        env:
          RELEASE_NAME: ${{ github.ref_name }}
        run: npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --config electron-builder.cjs --publish never

      - name: Verify packaged .opclib
        # Re-validates the embedded library for EVERY platform — including
        # Windows. The verifier reads the per-platform unpacked staging dir
        # (win-unpacked / linux-unpacked / mac-<arch>/OpenPCB.app), which is
        # exactly what gets packed into every installer, so no .exe/.dmg
        # unwrapping is needed. It enforces id, component count, AND 3D
        # GLB-completeness — the last guard catches a STEP-only CoreLibrary
        # pack (e.g. v0.1.0-beta.0) that would otherwise import as an EMPTY
        # library at runtime. Runs on all targets so no platform ships an
        # unverified bundle.
        run: bun scripts/verify-packaged-opclib.ts electron/out

      - name: Resolve packaged desktop executable
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const platform = process.env.PLATFORM;
          const out = path.resolve('electron', 'out');

          function assertFile(candidate) {
            if (!fs.existsSync(candidate)) {
              throw new Error(`Packaged executable not found: ${candidate}`);
            }
            return candidate;
          }

          let executable;
          if (platform === 'mac') {
            const dirs = fs.readdirSync(out)
              .filter((name) => name.startsWith('mac'))
              .sort();
            for (const dir of dirs) {
              const candidate = path.join(out, dir, 'OpenPCB.app', 'Contents', 'MacOS', 'OpenPCB');
              if (fs.existsSync(candidate)) {
                executable = candidate;
                break;
              }
            }
            if (!executable) throw new Error(`No macOS OpenPCB.app executable under ${out}`);
          } else if (platform === 'win') {
            executable = assertFile(path.join(out, 'win-unpacked', 'OpenPCB.exe'));
          } else if (platform === 'linux') {
            executable = assertFile(path.join(out, 'linux-unpacked', 'openpcb'));
            fs.chmodSync(executable, 0o755);
          } else {
            throw new Error(`Unsupported platform: ${platform}`);
          }

          console.log(`OPENPCB_ELECTRON_EXECUTABLE=${executable}`);
          fs.appendFileSync(process.env.GITHUB_ENV, `OPENPCB_ELECTRON_EXECUTABLE=${executable}${require('node:os').EOL}`);
          NODE

      - name: Run packaged desktop E2E smoke
        if: matrix.platform != 'linux'
        env:
          OPENPCB_E2E_NO_WEBSERVER: "1"
          OPENPCB_ELECTRON_EXPECT_PACKAGED: "1"
          ELECTRON_ENABLE_LOGGING: "1"
        run: npm run test:e2e:electron

      - name: Run packaged desktop E2E smoke (Linux/Xvfb)
        if: matrix.platform == 'linux'
        env:
          OPENPCB_E2E_NO_WEBSERVER: "1"
          OPENPCB_ELECTRON_EXPECT_PACKAGED: "1"
          ELECTRON_ENABLE_LOGGING: "1"
        run: xvfb-run -a npm run test:e2e:electron

      - name: Upload desktop E2E artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: desktop-e2e-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore

      - name: List build artifacts
        run: |
          find electron/out -maxdepth 3 -type f \
            \( -name '*.exe' -o -name '*.dmg' -o -name '*.zip' \
               -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \
               -o -name 'latest*.yml' \) -print | sort

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            electron/out/*.exe
            electron/out/*.dmg
            electron/out/*.zip
            electron/out/*.AppImage
            electron/out/*.deb
            electron/out/*.rpm
            electron/out/latest*.yml
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: github.event_name != 'workflow_dispatch'
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Merge multi-arch mac update feeds
        # Each mac matrix job emits its own latest-mac.yml with just that
        # arch's files[] entry. electron-updater expects a single unified
        # feed. Merge into one before upload to avoid a 422 on duplicate
        # asset name.
        run: |
          npm install --no-save js-yaml@4
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const yaml = require('js-yaml');

          function findAll(dir, name, acc = []) {
            for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
              const p = path.join(dir, e.name);
              if (e.isDirectory()) findAll(p, name, acc);
              else if (e.name === name) acc.push(p);
            }
            return acc;
          }

          const feeds = findAll('release-artifacts', 'latest-mac.yml');
          if (feeds.length <= 1) { console.log('No merge needed'); process.exit(0); }

          // Prefer arm64's feed as the base (first by path sort).
          feeds.sort();
          const base = yaml.load(fs.readFileSync(feeds[0], 'utf8'));
          const seen = new Set(base.files.map(f => f.url));

          for (const feed of feeds.slice(1)) {
            const data = yaml.load(fs.readFileSync(feed, 'utf8'));
            for (const f of data.files) {
              if (!seen.has(f.url)) {
                base.files.push(f);
                seen.add(f.url);
              }
            }
          }

          fs.writeFileSync(feeds[0], yaml.dump(base, { lineWidth: -1 }));
          for (const feed of feeds.slice(1)) fs.unlinkSync(feed);
          console.log(`Merged ${feeds.length} latest-mac.yml feeds; ${base.files.length} files listed`);
          NODE

      - name: Publish complete prerelease
        env:
          COREL_TAG: ${{ needs.build.outputs.corelib_tag }}
          COREL_VERSION: ${{ needs.build.outputs.corelib_version }}
          COREL_COMPONENTS: ${{ needs.build.outputs.corelib_components }}
          COREL_FOOTPRINTS: ${{ needs.build.outputs.corelib_footprints }}
          COREL_SYMBOLS: ${{ needs.build.outputs.corelib_symbols }}
        run: |
          gh release delete "${GITHUB_REF_NAME}" --yes || true
          mapfile -d '' files < <(find release-artifacts -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found" >&2
            exit 1
          fi
          printf 'Publishing artifacts:\n'
          printf '  %s\n' "${files[@]}"
          # Auto-append CoreLibrary bundle info so the release notes are
          # auditable without digging into workflow logs.
          notes="Unsigned beta builds (electron-builder). macOS arm64/x64 dmg+zip, Windows x64 NSIS+portable, Linux x64 AppImage/deb/rpm. Auto-update via electron-updater consumes the attached latest*.yml feeds.

          **Bundled CoreLibrary:** [${COREL_TAG}](https://github.com/OpenPCB-app/CoreLibrary/releases/tag/${COREL_TAG}) — v${COREL_VERSION} (${COREL_SYMBOLS} symbols, ${COREL_FOOTPRINTS} footprints, ${COREL_COMPONENTS} components)"
          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --prerelease \
            --title "${GITHUB_REF_NAME}" \
            --notes "$notes" \
            "${files[@]}"
