name: Release

on:
  push:
    tags:
      - "dev-*"
      - "v*"
  workflow_dispatch:
    inputs:
      artifact_suffix:
        description: "Suffix for build artifact names (e.g. smoke, dryrun)"
        required: false
        default: "smoke"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-15
            platform: mac
            arch: arm64
            rollup_package: darwin-arm64
            lightningcss_package: darwin-arm64
            tailwindcss_oxide_package: darwin-arm64
          - name: macOS x64
            os: macos-15-intel
            platform: mac
            arch: x64
            rollup_package: darwin-x64
            lightningcss_package: darwin-x64
            tailwindcss_oxide_package: darwin-x64
          - name: Windows x64
            os: windows-latest
            platform: win
            arch: x64
            rollup_package: win32-x64-msvc
            lightningcss_package: win32-x64-msvc
            tailwindcss_oxide_package: win32-x64-msvc
          - name: Linux x64
            os: ubuntu-latest
            platform: linux
            arch: x64
            rollup_package: linux-x64-gnu
            lightningcss_package: linux-x64-gnu
            tailwindcss_oxide_package: linux-x64-gnu

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache Electron + electron-builder downloads
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: ${{ runner.os }}-${{ runner.arch }}-eb-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-eb-

      - name: Install dependencies
        run: npm ci

      # @openpcb/* packages ship source-only via github: tags. npm ci runs
      # their prepare scripts but the cache can serve a stale-prepared tarball
      # when the same tag has been force-pushed (subtree-split re-points the
      # tag at a different SHA). Wipe and reinstall those packages to force
      # fresh prepare runs.
      - name: Inspect @openpcb/* dists (debug)
        run: |
          for pkg in kicad-parsers rendering-core kicad-import step-to-glb r3f-eda-canvas opclib-pack command-pattern contracts; do
            dir="node_modules/@openpcb/$pkg"
            echo "== $pkg =="
            ls -la "$dir/dist" 2>&1 | head -20 || echo "no dist/"
            grep -l signManifest "$dir/dist/"*.d.ts 2>/dev/null || true
          done
          echo "== nested opclib-pack copies =="
          find node_modules -name 'opclib-pack' -type d 2>&1
          echo "== nested package.json versions =="
          find node_modules -path '*/opclib-pack/package.json' -exec grep -H '"version"' {} \;

      - name: Force-refresh @openpcb/* deps
        run: |
          set -euo pipefail
          # Clear npm cache + remove + reinstall to bypass any cached
          # github-tag tarball whose prepare ran against older source.
          rm -rf node_modules/@openpcb
          npm cache clean --force
          npm install \
            github:OpenPCB-app/shared#kicad-parsers-v0.1.2 \
            github:OpenPCB-app/shared#rendering-core-v0.1.2 \
            github:OpenPCB-app/shared#kicad-import-v0.1.0 \
            github:OpenPCB-app/shared#step-to-glb-v0.1.3 \
            github:OpenPCB-app/shared#r3f-eda-canvas-v0.1.3 \
            github:OpenPCB-app/shared#opclib-pack-v0.2.0 \
            github:OpenPCB-app/shared#command-pattern-v0.1.0 \
            github:OpenPCB-app/shared#contracts-v0.1.0 \
            --no-save --foreground-scripts
          echo "== opclib-pack version after force-refresh =="
          grep '"version"' node_modules/@openpcb/opclib-pack/package.json
          echo "== dist files =="
          ls node_modules/@openpcb/opclib-pack/dist/
          echo "== signManifest export check =="
          grep -l signManifest node_modules/@openpcb/opclib-pack/dist/*.d.ts

      - name: Download CoreLibrary bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p .build/core-library
          tag="$(gh release view --repo OpenPCB-app/CoreLibrary --json tagName --jq .tagName)"
          if [ -z "$tag" ]; then
            echo "No CoreLibrary release tag found" >&2
            exit 1
          fi
          echo "Using CoreLibrary release $tag"
          gh release download "$tag" \
            --repo OpenPCB-app/CoreLibrary \
            --pattern 'openpcb-core-library-*.opclib' \
            --dir .build/core-library
          count=$(ls -1 .build/core-library/*.opclib 2>/dev/null | wc -l | tr -d ' ')
          if [ "$count" -ne 1 ]; then
            echo "Expected exactly one .opclib, found $count" >&2
            ls -la .build/core-library || true
            exit 1
          fi

      - name: Validate CoreLibrary bundle
        # Sanity-check the downloaded .opclib: confirm it's a valid ZIP and
        # the embedded manifest.json declares library.id === "openpcb.core".
        # Full validation runs at app import time; this is just a CI integrity
        # check before we waste 15+ min on electron-builder.
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { readdirSync, readFileSync } from "node:fs";
          import { resolve, join } from "node:path";
          import { unzipSync, strFromU8 } from "fflate";

          const dir = resolve(".build/core-library");
          const files = readdirSync(dir).filter((f) => f.endsWith(".opclib"));
          if (files.length !== 1) {
            throw new Error(`expected 1 .opclib, got ${files.length}`);
          }
          const bytes = new Uint8Array(readFileSync(join(dir, files[0])));
          const entries = unzipSync(bytes, {
            filter: (f) => f.name === "library.json",
          });
          const manifestBytes = entries["library.json"];
          if (!manifestBytes) {
            throw new Error("library.json missing from .opclib");
          }
          const manifest = JSON.parse(strFromU8(manifestBytes));
          if (manifest.library.id !== "openpcb.core") {
            throw new Error(`invalid library id: ${manifest.library.id}`);
          }
          console.log(
            `validated ${manifest.library.id}@${manifest.library.version}`,
          );
          NODE

      - name: Install Linux build deps
        if: matrix.platform == 'linux'
        # electron-builder ships appimagetool itself, so squashfs-tools is not
        # required. fakeroot+dpkg → .deb; rpm → .rpm via fpm.
        run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg rpm

      - name: Repair optional native dependencies
        run: |
          ROLLUP_VERSION="$(node -p "require('./package-lock.json').packages['node_modules/rollup'].version")"
          LIGHTNINGCSS_VERSION="$(node -p "require('./package-lock.json').packages['node_modules/lightningcss'].version")"
          TAILWINDCSS_OXIDE_VERSION="$(node -p "require('./package-lock.json').packages['node_modules/@tailwindcss/oxide'].version")"
          npm install --no-save \
            "@rollup/rollup-${{ matrix.rollup_package }}@${ROLLUP_VERSION}" \
            "lightningcss-${{ matrix.lightningcss_package }}@${LIGHTNINGCSS_VERSION}" \
            "@tailwindcss/oxide-${{ matrix.tailwindcss_oxide_package }}@${TAILWINDCSS_OXIDE_VERSION}"

      - name: Validate release version
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const rootPackage = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const electronPackage = JSON.parse(fs.readFileSync('electron/package.json', 'utf8'));
          const refName = process.env.GITHUB_REF_NAME || '';

          if (rootPackage.version !== electronPackage.version) {
            throw new Error(`Root package version ${rootPackage.version} does not match electron package version ${electronPackage.version}`);
          }

          if (refName.startsWith('dev-')) {
            console.log(`Dev tag ${refName} — skipping strict version match (package version ${electronPackage.version})`);
          } else {
            const tagVersion = refName.replace(/^v/, '');
            if (tagVersion !== electronPackage.version) {
              throw new Error(`Tag version ${tagVersion} does not match electron package version ${electronPackage.version}`);
            }
            console.log(`Release version ${tagVersion} validated`);
          }
          NODE

      - name: Typecheck
        run: npm run typecheck

      - name: Build frontend
        run: npm run build:frontend

      - name: Build electron main + preload (tsup)
        run: npm run build --workspace electron

      - name: Package with electron-builder
        working-directory: electron
        env:
          RELEASE_NAME: ${{ github.ref_name }}
        run: npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --config electron-builder.cjs --publish never

      - name: List build artifacts
        run: |
          find electron/out -maxdepth 3 -type f \
            \( -name '*.exe' -o -name '*.dmg' -o -name '*.zip' \
               -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \
               -o -name 'latest*.yml' \) -print | sort

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            electron/out/*.exe
            electron/out/*.dmg
            electron/out/*.zip
            electron/out/*.AppImage
            electron/out/*.deb
            electron/out/*.rpm
            electron/out/latest*.yml
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Merge multi-arch mac update feeds
        # Each mac matrix job emits its own latest-mac.yml with just that
        # arch's files[] entry. electron-updater expects a single unified
        # feed. Merge into one before upload to avoid a 422 on duplicate
        # asset name.
        run: |
          npm install --no-save js-yaml@4
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const yaml = require('js-yaml');

          function findAll(dir, name, acc = []) {
            for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
              const p = path.join(dir, e.name);
              if (e.isDirectory()) findAll(p, name, acc);
              else if (e.name === name) acc.push(p);
            }
            return acc;
          }

          const feeds = findAll('release-artifacts', 'latest-mac.yml');
          if (feeds.length <= 1) { console.log('No merge needed'); process.exit(0); }

          // Prefer arm64's feed as the base (first by path sort).
          feeds.sort();
          const base = yaml.load(fs.readFileSync(feeds[0], 'utf8'));
          const seen = new Set(base.files.map(f => f.url));

          for (const feed of feeds.slice(1)) {
            const data = yaml.load(fs.readFileSync(feed, 'utf8'));
            for (const f of data.files) {
              if (!seen.has(f.url)) {
                base.files.push(f);
                seen.add(f.url);
              }
            }
          }

          fs.writeFileSync(feeds[0], yaml.dump(base, { lineWidth: -1 }));
          for (const feed of feeds.slice(1)) fs.unlinkSync(feed);
          console.log(`Merged ${feeds.length} latest-mac.yml feeds; ${base.files.length} files listed`);
          NODE

      - name: Publish complete prerelease
        run: |
          gh release delete "${GITHUB_REF_NAME}" --yes || true
          mapfile -d '' files < <(find release-artifacts -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found" >&2
            exit 1
          fi
          printf 'Publishing artifacts:\n'
          printf '  %s\n' "${files[@]}"
          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --prerelease \
            --title "${GITHUB_REF_NAME}" \
            --notes "Unsigned beta builds (electron-builder). macOS arm64/x64 dmg+zip, Windows x64 NSIS+portable, Linux x64 AppImage/deb/rpm. Auto-update via electron-updater consumes the attached latest*.yml feeds." \
            "${files[@]}"
