name: ci

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  typecheck-and-test:
    name: typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: npm ci

      - name: Build @openpcb/* dists
        run: |
          set -euo pipefail
          for pkg in kicad-parsers rendering-core kicad-import step-to-glb r3f-eda-canvas opclib-pack command-pattern contracts; do
            dir="node_modules/@openpcb/$pkg"
            if [ -d "$dir" ] && [ -f "$dir/tsconfig.build.json" ]; then
              echo "::group::rebuild @openpcb/$pkg"
              (cd "$dir" && npx --no-install tsc -p tsconfig.build.json) || (cd "$dir" && npx tsc -p tsconfig.build.json)
              echo "::endgroup::"
            fi
          done

      - name: Typecheck
        run: npm run typecheck

      - name: Codegen drift check
        run: npm run gen:check

      - name: Backend tests (Bun)
        run: npm run test:backend

      - name: Frontend tests (Vitest)
        run: npm run test:react

  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: typecheck-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: npm ci

      - name: Build @openpcb/* dists
        run: |
          set -euo pipefail
          for pkg in kicad-parsers rendering-core kicad-import step-to-glb r3f-eda-canvas opclib-pack command-pattern contracts; do
            dir="node_modules/@openpcb/$pkg"
            if [ -d "$dir" ] && [ -f "$dir/tsconfig.build.json" ]; then
              (cd "$dir" && npx --no-install tsc -p tsconfig.build.json) || (cd "$dir" && npx tsc -p tsconfig.build.json)
            fi
          done

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
